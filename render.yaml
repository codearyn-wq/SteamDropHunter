services:
  - type: web
    name: steam-drop-hunter
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_ID
        sync: false
      - key: POLL_INTERVAL_MS
        value: 300000
      - key: LOG_LEVEL
        value: info
      - key: SERVER_PORT
        value: 3000
      - key: DATABASE_PATH
        value: ./data/steam_drop_hunter.db
      - key: API_KEY
        generateValue: true
      - key: KEEP_ALIVE_INTERVAL_MS
        value: 240000
      - key: RENDER_EXTERNAL_URL
        sync: false
    disk:
      name: steam-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
